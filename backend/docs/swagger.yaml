      tags:
      - ratings
    put:
      consumes:
      - application/json
      description: Update your rating for a travel plan (1-5 stars). Authenticated
        users can update their rating.
      parameters:
      - description: Plan ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Rating update request (stars: 1-5)'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.SubmitRatingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Rating updated with ID
