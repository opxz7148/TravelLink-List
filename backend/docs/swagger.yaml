      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Password change request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Validation error (invalid old password or weak new password)
          schema:
            $ref: '#/definitions/middleware.SwaggerErrorResponse'
        "401":
          description: User not authenticated
          schema:
            $ref: '#/definitions/middleware.SwaggerErrorResponse'
        "403":
          description: Can only change own password
          schema:
            $ref: '#/definitions/middleware.SwaggerErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/middleware.SwaggerErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/middleware.SwaggerErrorResponse'
      security:
      - Bearer: []
      summary: Change user password
      tags:
      - users
  /users/{id}/deactivate:
    patch:
      description: Admin can soft-delete (deactivate) a user account. Admin cannot
        deactivate self. (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User deactivated successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/middleware.SwaggerErrorResponse'
        "403":
          description: Cannot deactivate own account
          schema:
            $ref: '#/definitions/middleware.SwaggerErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/middleware.SwaggerErrorResponse'
      security:
      - Bearer: []
      summary: Deactivate user account
      tags:
      - admin
  /users/{id}/role:
    patch:
      consumes:
      - application/json
      description: Admin can change a user's role (simple/traveller/admin). Admin
        cannot change admin's own role. (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Role change request (role: simple|traveller|admin)'
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
